# Physical board detected as a classic ESP32 (esptool: "This chip is ESP32").
# If you switch to an ESP32-S3, change board back to esp32-s3-devkitc-1 and I2C pins to 8/9.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.4.2
